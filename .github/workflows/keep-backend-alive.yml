name: Keep Render Backend Alive

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: |
          echo "Pinging https://akb-k7yf.onrender.com ..."
          curl --fail --show-error --silent --max-time 30 \
            https://akb-k7yf.onrender.com
          echo ""
          echo "Ping successful."
